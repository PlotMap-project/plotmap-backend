spring.datasource.url=jdbc:postgresql://localhost:5433/plotmap
spring.datasource.username=plotmap
spring.datasource.password=plotmap_dev
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=${JWT_SECRET:default-secret-key-for-local-development-only-must-be-long-enough}
jwt.expiration=86400000

yandex.gpt.api-key=${YANDEX_GPT_API_KEY}
yandex.gpt.folder-id=${YANDEX_GPT_FOLDER_ID}
yandex.gpt.model-uri=gpt://${YANDEX_GPT_FOLDER_ID}/yandexgpt-lite
yandex.gpt.structured-output-enabled=false

spring.flyway.enabled=false

server.port=8080
